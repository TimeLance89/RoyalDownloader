name: Bug report
description: Report a reproducible Royal Downloader defect
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Remove API keys, tokens, cookies, private IP addresses, and media paths from logs and screenshots before submitting.
  - type: input
    id: build
    attributes:
      label: Build ID
      description: The local build ID shown under Settings → Updates.
      placeholder: 646bdb3…
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker Compose
        - NAS container with start.sh
        - Local Windows installation
        - Other
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Web interface
        - Movies
        - Series or subscriptions
        - Anime
        - Provider or hoster
        - Download queue
        - Jellyfin
        - Telegram
        - Seerr or Moonfin
        - Updates
        - Other
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Provider or content language
      description: Include the provider and selected content language when relevant.
      placeholder: "Example: SFlix, English"
  - type: textarea
    id: problem
    attributes:
      label: Actual behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Include only the relevant excerpt and remove all secrets and private data.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I use the latest `main` revision or verified that the bug still exists there.
          required: true
        - label: I removed credentials, tokens, cookies, private addresses, and media paths.
          required: true

