name: Feature request
description: Propose a focused improvement to Royal Downloader
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Which problem should this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed behavior
      description: How should Royal Downloader behave?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Which workaround or alternative do you currently use?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web interface
        - Movies
        - Series or subscriptions
        - Anime
        - Providers and languages
        - Download queue
        - Jellyfin
        - Telegram
        - Seerr or Moonfin
        - Docker or NAS
        - Updates
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Scope
      options:
        - label: This request describes one focused use case.
          required: true
        - label: I checked that no existing issue already covers it.
          required: true

