<svg xmlns="http://www.w3.org/2000/svg" width="960" height="220" viewBox="0 0 960 220" role="img" aria-labelledby="title desc">
  <title id="title">Royal Downloader</title>
  <desc id="desc">Golden crown and Royal Downloader lettering on a dark background</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#21152f"/>
      <stop offset="1" stop-color="#0d0913"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0d78f"/>
      <stop offset="0.55" stop-color="#d8b766"/>
      <stop offset="1" stop-color="#9d7430"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect x="4" y="4" width="952" height="212" rx="30" fill="url(#bg)" stroke="#4c365f" stroke-width="4"/>
  <g transform="translate(48 38)" filter="url(#shadow)">
    <path d="M12 54 42 83 72 26 104 82 136 50 124 116H24Z" fill="url(#gold)"/>
    <rect x="26" y="124" width="96" height="16" rx="8" fill="#f0d78f"/>
    <circle cx="12" cy="50" r="10" fill="#d8b766"/>
    <circle cx="73" cy="20" r="10" fill="#f0d78f"/>
    <circle cx="138" cy="46" r="10" fill="#d8b766"/>
    <path d="M42 94h64" stroke="#6b4820" stroke-width="7" stroke-linecap="round" opacity="0.65"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <text x="226" y="104" fill="#f7f1df" font-size="58" font-weight="750" letter-spacing="1">Royal Downloader</text>
    <text x="229" y="150" fill="#c7b7d3" font-size="22" font-weight="500" letter-spacing="4">SELF-HOSTED MEDIA AUTOMATION</text>
