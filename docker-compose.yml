services:
  seriendownloader:
    build:
      context: .
      args:
        # Optional CI override; local Git builds detect the revision automatically.
        APP_COMMIT_SHA: ${APP_COMMIT_SHA:-}
    image: seriendownloader:latest
    container_name: seriendownloader
    restart: unless-stopped
    # Privilege escalation inside the container (setuid binaries) is blocked.
    security_opt:
      - no-new-privileges:true
    ports:
      # Secure by default: only reachable from the Docker host itself.
      # For LAN access set BIND_ADDRESS=0.0.0.0 in .env – the app then
      # requires APP_USERNAME/APP_PASSWORD and refuses to start without them.
      - "${BIND_ADDRESS:-127.0.0.1}:8765:8765"
    # Consistent DNS resolution for Python, Chromium, ffmpeg, and yt-dlp.
    # A local resolver may use DNS-over-TLS for its upstream connection.
    dns:
      - ${DNS_PRIMARY:-1.1.1.1}
      - ${DNS_SECONDARY:-9.9.9.9}
    volumes:
      # Persistent application revision used by in-app updates.
      - ./runtime:/runtime
      # Persistent application state: cookies, anti-bot sessions, hoster
      # intelligence, settings, subscriptions, and queue state.
      - ./data:/app/data
      # Write completed media directly to Jellyfin library directories.
      # Set absolute NAS host paths in .env.
      - ${MOVIES_HOST_DIR:-./downloads/Filme}:/movies
      - ${SERIES_HOST_DIR:-./downloads/Serien}:/serien
    environment:
      APP_RUNTIME_DIR: /runtime
      SERIENDL_DATA_DIR: /app/data
      DOWNLOAD_DIR: /movies
      SERIES_DIR: /serien
      HOST: 0.0.0.0
      PORT: 8765
      OPEN_BROWSER: "0"
      APP_USERNAME: ${APP_USERNAME:-}
      APP_PASSWORD: ${APP_PASSWORD:-}
      # Deliberate opt-out only: exposes the UI without login on the network.
      ALLOW_UNAUTHENTICATED_LAN: ${ALLOW_UNAUTHENTICATED_LAN:-}
      # Required before UPDATE_GITHUB_REPOSITORY/BRANCH may deviate from the
      # official release source (updates are not cryptographically signed yet).
      UPDATE_ALLOW_CUSTOM_REPOSITORY: ${UPDATE_ALLOW_CUSTOM_REPOSITORY:-}
      JELLYFIN_URL: ${JELLYFIN_URL:-}
      JELLYFIN_API_KEY: ${JELLYFIN_API_KEY:-}
      JELLYFIN_USER_ID: ${JELLYFIN_USER_ID:-}
      JELLYFIN_USER_NAME: ${JELLYFIN_USER_NAME:-}
      # The recommender runs inside the server; settings.ini takes precedence.
      COLLECTION_NAME: ${COLLECTION_NAME:-Für dich empfohlen}
      TOP_N: ${TOP_N:-20}
      RECENCY_HALF_LIFE_DAYS: ${RECENCY_HALF_LIFE_DAYS:-180}
      RECOMMENDER_INTERVAL_SECONDS: ${RECOMMENDER_INTERVAL_SECONDS:-86400}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-120}
      PAGE_SIZE: ${PAGE_SIZE:-100}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      TMDB_LANGUAGE: ${TMDB_LANGUAGE:-de-DE}
      UI_LANGUAGE: ${UI_LANGUAGE:-de}
      UI_TRANSLATOR_URL: ${UI_TRANSLATOR_URL:-}
      UI_TRANSLATOR_API_KEY: ${UI_TRANSLATOR_API_KEY:-}
      SFLIX_BASE_URL: ${SFLIX_BASE_URL:-https://sflix.win}
      RIDOMOVIES_BASE_URL: ${RIDOMOVIES_BASE_URL:-https://ridomovies.su}
      SEERR_ENABLED: ${SEERR_ENABLED:-false}
      SEERR_URL: ${SEERR_URL:-http://seerr:5055}
      SEERR_API_KEY: ${SEERR_API_KEY:-}
      SEERR_POLL_INTERVAL_SECONDS: ${SEERR_POLL_INTERVAL_SECONDS:-60}
      UPDATE_GITHUB_REPOSITORY: ${UPDATE_GITHUB_REPOSITORY:-TimeLance89/RoyalDownloader}
      UPDATE_GITHUB_BRANCH: ${UPDATE_GITHUB_BRANCH:-main}
      UPDATE_MODE: ${UPDATE_MODE:-manual}
      AUTO_UPDATE_INTERVAL_HOURS: ${AUTO_UPDATE_INTERVAL_HOURS:-6}
      YTDLP_AUTO_UPDATE: ${YTDLP_AUTO_UPDATE:-true}
      YTDLP_UPDATE_INTERVAL_HOURS: ${YTDLP_UPDATE_INTERVAL_HOURS:-24}
      YTDLP_UPDATE_START_DELAY_SECONDS: ${YTDLP_UPDATE_START_DELAY_SECONDS:-300}
      AUTO_DOWNLOAD: ${AUTO_DOWNLOAD:-false}
      CHECK_INTERVAL_MIN: ${CHECK_INTERVAL_MIN:-30}
      DL_WINDOW_START: ${DL_WINDOW_START:-}
      DL_WINDOW_END: ${DL_WINDOW_END:-}
      # Media transfer: parallel HLS and ranged requests for throttled MP4 CDNs.
      # Sustained slow sources are replaced after the grace and sampling windows.
      HLS_CONCURRENT_FRAGMENTS: ${HLS_CONCURRENT_FRAGMENTS:-4}
      MP4_HTTP_CHUNK_SIZE: ${MP4_HTTP_CHUNK_SIZE:-4M}
      SLOW_DOWNLOAD_MIN_KIBPS: ${SLOW_DOWNLOAD_MIN_KIBPS:-384}
      SLOW_DOWNLOAD_GRACE_SECONDS: ${SLOW_DOWNLOAD_GRACE_SECONDS:-45}
      SLOW_DOWNLOAD_WINDOW_SECONDS: ${SLOW_DOWNLOAD_WINDOW_SECONDS:-90}
      DNS_PRIMARY: ${DNS_PRIMARY:-1.1.1.1}
      DNS_SECONDARY: ${DNS_SECONDARY:-9.9.9.9}
      # Time zone used by logs and schedules; override it in .env.
      TZ: ${TZ:-Europe/Berlin}
    # Headless Chromium needs more than Docker's default 64 MB /dev/shm.
    shm_size: "1gb"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  seerr:
    # Pinned release instead of a movable "latest" tag; bump deliberately.
    image: ghcr.io/seerr-team/seerr:${SEERR_IMAGE_TAG:-v3.0.1}
    init: true
    container_name: seerr
    security_opt:
      - no-new-privileges:true
    environment:
      LOG_LEVEL: ${SEERR_LOG_LEVEL:-info}
      TZ: ${TZ:-Europe/Berlin}
      PORT: 5055
    ports:
      # Seerr stays host-local by default; publish it deliberately via .env.
      - "${SEERR_BIND_ADDRESS:-127.0.0.1}:5055:5055"
    volumes:
      # SQLite and application configuration. Copy only while Seerr is stopped.
      - ./data/seerr:/app/config
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5055/api/v1/settings/public || exit 1"]
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
